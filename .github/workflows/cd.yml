name: CD

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  BASTION_HOST: ${{ vars.BASTION_HOST }}
  BASTION_USER: ${{ vars.BASTION_USER }}
  PRIVATE_HOST: ${{ vars.PRIVATE_HOST }}
  PRIVATE_USER: ${{ vars.PRIVATE_USER }}

  PORT: ${{ secrets.PORT }}
  NODE_ENV: ${{ secrets.NODE_ENV }}
  DB_HOST: ${{ secrets.DB_HOST }}
  DB_PORT: ${{ secrets.DB_PORT }}
  DB_NAME: ${{ secrets.DB_NAME }}
  MYSQL_USER: ${{ secrets.MYSQL_USER }}
  MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}

  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

jobs:
  cd:
    name: CD
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Configure SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Bastion hop and pull latest ECR image
        shell: bash
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o GlobalKnownHostsFile=/dev/null \
            -J "$BASTION_USER@$BASTION_HOST" \
            "$PRIVATE_USER@$PRIVATE_HOST" \
            "set -euo pipefail; aws ecr get-login-password --region '$AWS_REGION' | docker login --username AWS --password-stdin '$ECR_REGISTRY'; docker pull '$ECR_REGISTRY/$ECR_REPOSITORY:latest'; SCRIPT_PATH=\$(find ~ -maxdepth 5 -name run-dev-compose-check.sh -type f | head -n 1); if [ -z \"\$SCRIPT_PATH\" ]; then echo 'run-dev-compose-check.sh not found on target host'; exit 1; fi; APP_DIR=\$(dirname \"\$SCRIPT_PATH\"); printf '%s\n' 'PORT=$PORT' 'NODE_ENV=$NODE_ENV' 'DB_HOST=$DB_HOST' 'DB_PORT=$DB_PORT' 'DB_NAME=$DB_NAME' 'MYSQL_USER=$MYSQL_USER' 'MYSQL_PASSWORD=$MYSQL_PASSWORD' 'JWT_SECRET=$JWT_SECRET' 'CORS_ORIGIN=$CORS_ORIGIN' > \"\$APP_DIR/.env\"; cd \"\$APP_DIR\"; chmod +x ./run-dev-compose-check.sh; ./run-dev-compose-check.sh"
